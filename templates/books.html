<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Books - BookMarket</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/skeletons.css">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>📚 BookMarket</h1>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/books" class="nav-link active">Browse Books</a>
                <a href="/login" class="nav-link" id="loginLink">Login</a>
                <a href="/profile" class="nav-link" id="profileLink" style="display: none;">Profile</a>
                <button class="btn-logout" id="logoutBtn" style="display: none;">Logout</button>
                <button id="themeToggleBtn" class="theme-toggle-btn">🌓</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1>Browse Books</h1>
            <button class="btn btn-primary" id="addBookBtn" style="display: none;">+ Add Book</button>
        </div>

        <!-- Add Book Modal -->
        <div id="addBookModal" class="modal" style="display: none;">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>List a New Book</h2>
                <form id="addBookForm">
                    <div class="form-group">
                        <label for="bookTitle">Title *</label>
                        <input type="text" id="bookTitle" required>
                    </div>
                    <div class="form-group">
                        <label for="bookAuthor">Author *</label>
                        <input type="text" id="bookAuthor" required>
                    </div>
                    <div class="form-group">
                        <label for="bookISBN">ISBN</label>
                        <input type="text" id="bookISBN">
                    </div>
                    <div class="form-group">
                        <label for="bookDescription">Description</label>
                        <textarea id="bookDescription" rows="4"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="bookPrice">Price (₹) *</label>
                            <input type="number" id="bookPrice" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="bookOriginalPrice">Original Price (₹)</label>
                            <input type="number" id="bookOriginalPrice" step="0.01">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="bookCondition">Condition *</label>
                        <select id="bookCondition" required>
                            <option value="">Select condition</option>
                            <option value="New">New</option>
                            <option value="Like New">Like New</option>
                            <option value="Good">Good</option>
                            <option value="Fair">Fair</option>
                            <option value="Poor">Poor</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="bookCategory">Category</label>
                        <input type="text" id="bookCategory" placeholder="e.g., Fiction, Science, History">
                    </div>
                    <div class="form-group">
                        <label for="bookImageUrl">Image URL</label>
                        <input type="url" id="bookImageUrl" placeholder="https://example.com/image.jpg">
                        <p style="margin: 0.5rem 0; font-size: 0.8rem; color: var(--text-light); text-align: center;">- OR -</p>
                        <label for="bookImageFile">Upload Image</label>
                        <input type="file" id="bookImageFile" accept="image/*" style="padding: 0.5rem 0;">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">List Book</button>
                </form>
                <div id="addBookError" class="error-message"></div>
            </div>
        </div>

        <div id="booksContainer" class="books-grid">
            <!-- Books will be loaded here -->
        </div>

        <div id="loadingMessage" class="loading-message">Loading books...</div>
        <div id="noBooksMessage" class="no-books-message" style="display: none;">
            <p>No books available at the moment. Be the first to list a book!</p>
        </div>
    </main>

    <script src="/static/js/app.js"></script>
    <script>
        checkAuthStatus();
        loadBooks();

        // Modal handling
        const modal = document.getElementById('addBookModal');
        const addBookBtn = document.getElementById('addBookBtn');
        const closeBtn = document.querySelector('.close');

        if (addBookBtn) {
            addBookBtn.addEventListener('click', () => {
                if (isAuthenticated()) {
                    modal.style.display = 'block';
                } else {
                    window.location.href = '/login';
                }
            });
        }

        if (closeBtn) {
            closeBtn.addEventListener('click', () => {
                modal.style.display = 'none';
            });
        }

        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });

        // Add book form
        document.getElementById('addBookForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login';
                return;
            }

            const imageUrlInput = document.getElementById('bookImageUrl').value;
            const imageFile = document.getElementById('bookImageFile').files[0];
            let imageUrl = imageUrlInput || null;

            try {
                // If a file is selected, upload it first
                if (imageFile) {
                    const formData = new FormData();
                    formData.append('file', imageFile);
                    
                    const uploadResponse = await fetch('/api/books/upload-image', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        },
                        body: formData
                    });

                    if (uploadResponse.ok) {
                        const uploadData = await uploadResponse.json();
                        imageUrl = uploadData.image_url;
                    } else {
                        throw new Error('Image upload failed');
                    }
                }

                const bookData = {
                    title: document.getElementById('bookTitle').value,
                    author: document.getElementById('bookAuthor').value,
                    isbn: document.getElementById('bookISBN').value || null,
                    description: document.getElementById('bookDescription').value || null,
                    price: parseFloat(document.getElementById('bookPrice').value),
                    original_price: document.getElementById('bookOriginalPrice').value ? 
                        parseFloat(document.getElementById('bookOriginalPrice').value) : null,
                    condition: document.getElementById('bookCondition').value,
                    category: document.getElementById('bookCategory').value || null,
                    image_url: imageUrl
                };

                const response = await fetch('/api/books', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(bookData)
                });

                if (response.ok) {
                    modal.style.display = 'none';
                    document.getElementById('addBookForm').reset();
                    loadBooks();
                } else {
                    const error = await response.json();
                    document.getElementById('addBookError').textContent = 
                        error.detail || 'Failed to add book';
                }
            } catch (error) {
                document.getElementById('addBookError').textContent = 
                    'An error occurred. Please try again.';
            }
        });
    </script>
</body>
</html>
