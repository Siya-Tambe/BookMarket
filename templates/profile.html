<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - BookMarket</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/skeletons.css">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>📚 BookMarket</h1>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/books" class="nav-link">Browse Books</a>
                <a href="/profile" class="nav-link active">Profile</a>
                <button class="btn-logout" id="logoutBtn">Logout</button>
                <button id="themeToggleBtn" class="theme-toggle-btn">🌓</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="profile-header">
            <h1>My Profile</h1>
            <div id="userInfo" class="user-info-card">
                <div class="user-avatar">👤</div>
                <div class="user-details">
                    <h2 id="userName">Loading...</h2>
                    <p id="userEmail">Loading...</p>
                    <button class="btn btn-secondary btn-small" style="margin-top: 1rem;" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>

        <div class="profile-tabs">
            <button class="tab-btn active" data-tab="all">All Books</button>
            <button class="tab-btn" data-tab="available">Available</button>
            <button class="tab-btn" data-tab="sold">Sold</button>
        </div>

        <div id="myBooksContainer" class="books-grid">
            <!-- User's books will be loaded here -->
        </div>

        <div id="noBooksMessage" class="no-books-message" style="display: none;">
            <p>You haven't listed any books yet. <a href="/books">List your first book!</a></p>
        </div>
    </main>

    <script src="/static/js/app.js"></script>
    <script>
        // Check authentication
        if (!isAuthenticated()) {
            window.location.href = '/login';
        } else {
            loadUserInfo();
            loadMyBooks();
        }

        // Tab switching
        let currentFilter = 'all';
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.tab;
                loadMyBooks();
            });
        });

        async function loadUserInfo() {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch('/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('userName').textContent = user.full_name || user.username;
                    document.getElementById('userEmail').textContent = user.email;
                }
            } catch (error) {
                console.error('Failed to load user info:', error);
            }
        }

        async function loadMyBooks() {
            const token = localStorage.getItem('token');
            const container = document.getElementById('myBooksContainer');
            const noBooksMsg = document.getElementById('noBooksMessage');

            // Inject 4 Skeletons instantly
            container.innerHTML = getSkeletonCardsHTML(4);
            noBooksMsg.style.display = 'none';

            try {
                const response = await fetch('/api/users/me/books', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const books = await response.json();
                    let filteredBooks = books;

                    if (currentFilter === 'available') {
                        filteredBooks = books.filter(b => !b.is_sold);
                    } else if (currentFilter === 'sold') {
                        filteredBooks = books.filter(b => b.is_sold);
                    }

                    // Clear skeletons
                    container.innerHTML = '';

                    if (filteredBooks.length === 0) {
                        noBooksMsg.style.display = 'block';
                    } else {
                        noBooksMsg.style.display = 'none';
                        filteredBooks.forEach(book => {
                            container.appendChild(createBookCard(book, true));
                        });
                    }
                } else {
                    container.innerHTML = '<p class="error-message">Failed to load books</p>';
                }
            } catch (error) {
                container.innerHTML = '<p class="error-message">An error occurred</p>';
            }
        }

        function createBookCard(book, isOwner = false) {
            const card = document.createElement('div');
            card.className = `book-card ${book.is_sold ? 'sold' : ''}`;
            
            const soldBadge = book.is_sold ? '<span class="sold-badge">SOLD</span>' : '';
            const discountBadge = book.original_price && book.original_price > book.price ? 
                `<span class="discount-badge">${Math.round((1 - book.price/book.original_price) * 100)}% OFF</span>` : '';
            
            card.innerHTML = `
                ${soldBadge}
                ${discountBadge}
                <div class="book-image">
                    ${book.image_url ? `<img src="${book.image_url}" alt="${book.title}">` : '<div class="book-placeholder">📖</div>'}
                </div>
                <div class="book-info">
                    <h3>${book.title}</h3>
                    <p class="book-author">by ${book.author}</p>
                    <p class="book-condition">Condition: ${book.condition}</p>
                    ${book.category ? `<p class="book-category">${book.category}</p>` : ''}
                    <div class="book-price">
                        <span class="price">₹${book.price.toFixed(2)}</span>
                        ${book.original_price ? `<span class="original-price">₹${book.original_price.toFixed(2)}</span>` : ''}
                    </div>
                    ${isOwner ? `
                        <div class="book-actions">
                            <button class="btn btn-small" onclick="markAsSold(${book.id}, ${!book.is_sold})">
                                ${book.is_sold ? 'Mark as Available' : 'Mark as Sold'}
                            </button>
                            <button class="btn btn-small btn-danger" onclick="deleteBook(${book.id})">Delete</button>
                        </div>
                    ` : ''}
                </div>
            `;
            return card;
        }

        async function markAsSold(bookId, markAsSold) {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`/api/books/${bookId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ is_sold: markAsSold })
                });

                if (response.ok) {
                    loadMyBooks();
                } else {
                    alert('Failed to update book status');
                }
            } catch (error) {
                alert('An error occurred');
            }
        }

        async function deleteBook(bookId) {
            if (!confirm('Are you sure you want to delete this book?')) return;
            
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`/api/books/${bookId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    loadMyBooks();
                } else {
                    alert('Failed to delete book');
                }
            } catch (error) {
                alert('An error occurred');
            }
        }

        window.markAsSold = markAsSold;
        window.deleteBook = deleteBook;
    </script>
</body>
</html>
